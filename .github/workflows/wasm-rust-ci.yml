name: wasm-rust-ci

on:
  # Keep this branch-scoped so experimental WASM CI can run on direct pushes.
  pull_request:
    branches:
      - wasm
    paths:
      - ".github/workflows/wasm-rust-ci.yml"
      - ".github/workflows/xcodex-wasm-release.yml"
      - "codex-rs/wasm/**"
  push:
    branches:
      - wasm
    paths:
      - ".github/workflows/wasm-rust-ci.yml"
      - ".github/workflows/xcodex-wasm-release.yml"
      - "codex-rs/wasm/**"
  workflow_dispatch:

jobs:
  rust-ci:
    name: wasm fmt + clippy + tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6
      - name: Install DotSlash
        uses: facebook/install-dotslash@v2
      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - name: cargo fmt codex-wasm-core
        run: cargo fmt --manifest-path wasm/core/Cargo.toml --all --check
      - name: cargo fmt codex-wasm-app-server
        run: cargo fmt --manifest-path wasm/app_server/Cargo.toml --all --check
      - name: cargo fmt codex-wasm-browser
        run: cargo fmt --manifest-path wasm/browser/Cargo.toml --all --check
      - name: cargo clippy codex-wasm-core
        run: cargo clippy -p codex-wasm-core --all-features --tests -- -D warnings
      - name: cargo clippy codex-wasm-app-server
        run: cargo clippy -p codex-wasm-app-server --all-features --tests -- -D warnings
      - name: cargo test codex-wasm-core
        run: cargo test -p codex-wasm-core --all-features
      - name: cargo test codex-wasm-app-server
        run: cargo test -p codex-wasm-app-server --all-features
      - name: cargo check codex-wasm-browser
        run: cargo check -p codex-wasm-browser --target wasm32-unknown-unknown
