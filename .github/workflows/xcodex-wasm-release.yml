name: xcodex-wasm-release

on:
  # workflow_run:
  #   workflows:
  #     - wasm-rust-ci
  #   types:
  #     - completed
  workflow_dispatch:

concurrency:
  group: xcodex-wasm-release
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build and publish xcodex-wasm
    runs-on: ubuntu-24.04
    # Publish only from the dedicated wasm branch. This workflow is intentionally
    # scoped to the fork's WASM surface and does not validate or release
    # unrelated upstream crates.
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref_name == 'wasm'
    permissions:
      contents: write
    env:
      # RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      # RELEASE_REF_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      RELEASE_SHA: ${{ github.sha }}
      RELEASE_REF_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            codex-rs -> codex-rs/target

      - name: Install wasm-bindgen
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen

      - name: Build xcodex-wasm runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/xcodex-wasm/current
          cargo build \
            --manifest-path codex-rs/Cargo.toml \
            -p codex-wasm-browser \
            --target wasm32-unknown-unknown \
            --release
          wasm-bindgen \
            codex-rs/target/wasm32-unknown-unknown/release/codex_wasm_browser.wasm \
            --target web \
            --out-dir dist/xcodex-wasm/current \
            --out-name xcodex

      - name: Install browser runtime bundler dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm install --prefix codex-rs/wasm

      - name: Build xcodex browser runtime bundle
        shell: bash
        run: |
          set -euo pipefail
          npm exec --prefix codex-rs/wasm esbuild -- \
            codex-rs/wasm/ts/browser-runtime/src/index.ts \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --sourcemap \
            --outfile=dist/xcodex-wasm/current/xcodex-runtime.js

      - name: Write build manifest
        shell: bash
        run: |
          set -euo pipefail
          build_id="${RELEASE_SHA}"
          cat > dist/xcodex-wasm/manifest.json <<EOF
          {
            "buildId": "${build_id}",
            "entry": "/xcodex-wasm/current/xcodex.js",
            "wasm": "/xcodex-wasm/current/xcodex_bg.wasm",
            "runtime": "/xcodex-wasm/current/xcodex-runtime.js"
          }
          EOF

      - name: Add release metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > dist/xcodex-wasm/README.md <<'EOF'
          # xcodex-wasm

          Rolling wasm branch build of the browser WASM runtime for xcodex.

          Files:
          - current/xcodex.js
          - current/xcodex_bg.wasm
          - current/xcodex.d.ts
          - current/xcodex-runtime.js
          - current/xcodex-runtime.js.map
          - manifest.json
          EOF

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          tar -C dist -czf dist/xcodex-wasm.tar.gz xcodex-wasm
          sha256sum dist/xcodex-wasm.tar.gz > dist/xcodex-wasm.tar.gz.sha256
          cat > dist/xcodex-wasm-release.txt <<EOF
          xcodex-wasm rolling wasm build
          commit=${RELEASE_SHA}
          ref=${RELEASE_REF_NAME}
          run_id=${GITHUB_RUN_ID}
          artifact=xcodex-wasm.tar.gz
          entry=/xcodex-wasm/current/xcodex.js
          wasm=/xcodex-wasm/current/xcodex_bg.wasm
          runtime=/xcodex-wasm/current/xcodex-runtime.js
          manifest=/xcodex-wasm/manifest.json
          EOF

      - name: Move rolling release tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f xcodex-wasm "${RELEASE_SHA}"
          git push origin refs/tags/xcodex-wasm --force

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Automated rolling browser/WASM build for \`xcodex-wasm\`.

          - branch: \`${RELEASE_REF_NAME}\`
          - commit: \`${RELEASE_SHA}\`
          - artifact: \`xcodex-wasm.tar.gz\`
          - entrypoint: \`xcodex.js\`
          - wasm binary: \`xcodex_bg.wasm\`
          - runtime bundle: \`xcodex-runtime.js\`
          - manifest: \`manifest.json\`

          This release is published manually from the \`wasm\` branch.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xcodex-wasm
          name: xcodex-wasm
          prerelease: true
          body_path: release-notes.md
          overwrite_files: true
          files: |
            dist/xcodex-wasm.tar.gz
            dist/xcodex-wasm.tar.gz.sha256
            dist/xcodex-wasm-release.txt
